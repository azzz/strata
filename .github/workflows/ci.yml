name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          problem-matchers: true

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.mod

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail

          output_file="$(mktemp)"
          go test ./... 2>&1 | tee "$output_file"
          status=${PIPESTATUS[0]}

          while IFS= read -r line; do
            if [[ "$line" =~ ^([^:[:space:]]+\.go):([0-9]+):[[:space:]](.*)$ ]]; then
              file="${BASH_REMATCH[1]}"
              line_no="${BASH_REMATCH[2]}"
              message="${BASH_REMATCH[3]}"
              echo "::error file=${file},line=${line_no}::${message}"
            fi
          done < "$output_file"

          exit "$status"
